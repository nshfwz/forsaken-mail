name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          build() {
            local goos="$1"
            local goarch="$2"
            local ext="$3"
            local name="forsaken-mail-${VERSION}-${goos}-${goarch}${ext}"
            echo "building ${name}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build -trimpath -ldflags "-s -w" -o "dist/${name}" ./cmd/server
            if [[ "${goos}" != "windows" ]]; then
              chmod +x "dist/${name}"
            fi
          }

          build linux amd64 ""
          build linux arm64 ""
          build windows amd64 ".exe"
          build windows arm64 ".exe"
          build darwin amd64 ""
          build darwin arm64 ""

          (
            cd dist
            sha256sum * > checksums.txt
          )

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*
